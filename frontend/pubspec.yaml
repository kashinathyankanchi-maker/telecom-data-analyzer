name: telecom_analyzer
description: Windows Telecom Data Analyzer — Local CDR, SDR, TDR analysis with GPS mapping.
publish_to: none
version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.1.4

  # ── Local CSV Parsing ─────────────────────────────────────────────────────────
  csv: ^6.0.0                        # Parse CSV files entirely in Dart

  # ── Local Database (Windows FFI) ─────────────────────────────────────────────
  sqflite_common_ffi: ^2.3.3         # SQLite on Windows desktop via FFI
  sqflite: ^2.3.3                    # SQLite base package
  path: ^1.9.0                       # Path utilities for database file location

  # ── File Picker ──────────────────────────────────────────────────────────────
  file_picker: ^11.0.0

  # ── Maps ─────────────────────────────────────────────────────────────────────
  flutter_map: ^6.2.1
  latlong2: ^0.9.1

  # ── Graph / Link Analysis ────────────────────────────────────────────────────
  graphview: ^1.5.1

  # ── Charts ───────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── UI Utilities ─────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
